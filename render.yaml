services:
  - type: web
    name: setor-compras
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /auth/login
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
